name: Release

on:
  push:
    tags: [ '[0-9]+.[0-9]+.[0-9]+' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. 0.3.3)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install latest nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Cap'n Proto
        run: choco install capnproto

      - name: Install WiX Toolset
        run: choco install wixtoolset

      - name: Install cargo-wix
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-wix

      - name: Build shared
        run: cargo build --release --manifest-path=shared/Cargo.toml

      - name: Build blocker
        run: cargo build --release --manifest-path=burnt-sushi-blocker/Cargo.toml

      - name: Build cli
        run: cargo build --release --manifest-path=burnt-sushi/Cargo.toml

      - name: Rename portable exe
        run: Copy-Item "burnt-sushi/target/x86_64-pc-windows-msvc/release/BurntSushi.exe" "BurntSushi-x86_64.exe"

      - name: Build MSI installer
        working-directory: burnt-sushi
        run: cargo wix --nocapture --output ../BurntSushi-x86_64.msi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: burnt-sushi-x86_64
          path: |
            BurntSushi.exe
            BurntSushi.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: artifacts/*
